<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HearMe - Welcome Back</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="brand-header">
        <h1>HearMe</h1>
        <p>Your safe space for healing</p>
    </div>

    <div class="container">
        <div class="form-box">
            <h2>Welcome Back</h2>

            <!-- ✅ IMPORTANT: form connects to PHP -->
            <form method="POST" action="#" id="login-form">

                <p class="label-text">I am a:</p>
                <div class="role-selector">
                    <div class="role-option active" data-role="user">
                        <i class="fa-regular fa-user"></i>
                        <span>User</span>
                    </div>
                    <div class="role-option" data-role="therapist">
                        <i class="fa-solid fa-user-doctor"></i>
                        <span>Therapist</span>
                    </div>
                    <div class="role-option" data-role="admin">
                        <i class="fa-solid fa-shield"></i>
                        <span>Admin</span>
                    </div>
                </div>

                <div class="anon-toggle">
                    <input type="checkbox" id="anonymous" checked>
                    <label for="anonymous">Keep me completely anonymous (recommended)</label>
                </div>

                <!-- ✅ FIXED: EMAIL FIELD -->
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input 
                        id="email" 
                        name="email" 
                        type="email" 
                        placeholder="Enter your email" 
                        required
                    >
                </div>

                <!-- ✅ FIXED: PASSWORD FIELD -->
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input 
                        id="password" 
                        name="password" 
                        type="password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <button type="submit" id="Btn">Sign In</button>

                <p class="footer-text therapist-hint" id="therapist-login-hint" hidden>
                    Signing in as a <strong>Therapist</strong>? Use the email you registered with (not anonymous username).
                </p>
                <p class="footer-text">
                    Don't have an account? <a href="SignUp.html">Sign up</a>
                </p>

            </form>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
