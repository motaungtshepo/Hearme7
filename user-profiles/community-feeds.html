<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HearMe | Community Feed</title>
    <link rel="stylesheet" href="community-feeds.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="navbar">
        <h1 class="logo">HearMe</h1>
        <div class="user-avatar">A</div>
    </header>

    <div class="app-container">
     <nav class="sidebar">
        <a href="community-feeds.html" class="nav-item active"><i data-lucide="home"></i><span>Feed</span></a>
        <a href="groups.html" class="nav-item active"><i data-lucide="users"></i><span>Groups</span></a>
        <a href="ai-chat.html" class="nav-item"><i data-lucide="message-square"></i><span>AI Chat</span></a>
        <a href="experts.html" class="nav-item"><i data-lucide="user-plus"></i><span>Experts</span></a>
        <a href="messages.html" class="nav-item"><i data-lucide="mail"></i><span>Messages</span></a>
        <a href="sos.html" class="nav-item"><i data-lucide="alert-circle"></i><span>SOS</span></a>
        <a href="relief.html" class="nav-item"><i data-lucide="heart"></i><span>Relief</span></a>
        <a href="profile.html" class="nav-item"><i data-lucide="user"></i><span>Profile</span></a>
    </nav>

        <main class="feed-area">
            <div class="feed-content">
                <div class="feed-header">
                    <h2 class="page-title">Community Feed</h2>
                    <!-- <button id="clear-btn" class="clear-button">Clear Feed</button> -->
                </div>
                <!-- Replace your existing .input-card div with this -->

<div class="input-card">

  <!-- COLLAPSED STATE (default) -->
  <div class="post-input-wrapper" id="post-collapsed">
    <input type="text" id="post-input-simple" placeholder="Share your thoughts anonymously..." readonly>
    <button class="post-submit-btn" id="open-composer">Post</button>
  </div>

  <!-- EXPANDED STATE (shown when clicked) -->
  <div class="post-composer" id="post-expanded" style="display:none;">

    <div class="post-tabs">
      <button class="tab-btn active" data-type="struggle">Struggle Post</button>
      <button class="tab-btn" data-type="success">Success Story</button>
    </div>

    <textarea id="post-textarea"
      class="post-textarea"
      placeholder="Share what you're going through... You're not alone."></textarea>

    <div class="post-actions">
      <div class="left-actions">
        <label class="media-upload">
          <i data-lucide="image"></i>
          <span>Add image/GIF</span>
          <input type="file" hidden>
        </label>
      </div>
      <div class="right-actions">
        <button class="cancel-btn" id="cancel-post">Cancel</button>
        <button id="post-button" class="post-submit-btn">Post</button>
      </div>
    </div>

  </div>

</div>
                <div id="post-container" class="post-list"></div>
            </div>
        </main>
    </div>

    <button class="help-fab"><i data-lucide="help-circle"></i></button>

    <script src="community-feeds.js"></script>
</body>
</html>
